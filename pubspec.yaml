name: imdbmoviesapps
description: "A Flutter application for browsing and searching movies on IMDb."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  animated_splash_screen: ^1.3.0
  carousel_slider: ^5.0.0
  fluttertoast: ^9.0.0
  font_awesome_flutter: ^11.0.0
  http: ^1.1.2
  google_fonts: ^6.3.1
  image_cropper: ^11.0.0
  image_picker: ^1.0.5
  path_provider: ^2.0.11
  shared_preferences: ^2.1.2
  sqflite: ^2.2.2
  url_launcher: ^6.1.7
  webview_flutter: ^4.4.2
  youtube_player_flutter: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: assets/icons/logo.png
  adaptive_icon_background: "#FFFFFF"
